#:schema ../schema/work.schema.json

[govctl]
id = "WI-2026-06-01-166"
title = "Convert CLI-visible errors to diagnostics"
status = "done"
created = "2026-06-01"
started = "2026-06-01"
completed = "2026-06-01"

[content]
description = "Audit and migrate CLI-visible error paths so expected user-facing failures are represented as structured Diagnostic values with stable codes and scope context. Keep the work focused on error boundaries and helpers; do not redesign command behavior or broaden unrelated refactors."
notes = [
    "Audit found non-Diagnostic CLI-visible exits in command_router/execute scope helpers, write/render filesystem helpers, config/tag config parsing, guard creation/show output, changelog write/read paths, and several serialization conversions. Treat anyhow::Result as a temporary transport boundary only; expected user-facing failures should originate as Diagnostic.",
    "After cleanup, remaining anyhow::Error references are transport helpers that wrap Diagnostic, tests, loop summary inspection of Diagnostic errors, or TUI feature boundaries. The default CLI path now converts any unexpected non-Diagnostic error to E0903 instead of printing raw ui::error.",
]

[[content.acceptance_criteria]]
text = "direct command-router invariant failures return Diagnostic errors instead of uncoded anyhow messages"
status = "done"
category = "changed"

[[content.acceptance_criteria]]
text = "file I/O and serialization helpers used by CLI commands map failures to Diagnostic values"
status = "done"
category = "changed"

[[content.acceptance_criteria]]
text = "remaining intentional anyhow boundaries are documented as transport or test-only, not user-facing errors"
status = "done"
category = "changed"

[[content.acceptance_criteria]]
