[content]
description = "After e3d19afd, acceptance criteria render with category prefixes (e.g. 'fixed: some text'). But tick/remove matching only compares against the text field, so agents using displayed text fail with E0806. Fix: strip known category prefixes from patterns before matching."
notes = ["Acceptance-criteria match patterns strip known changelog category prefixes before matching, except in regex mode where the pattern remains literal."]

[[content.acceptance_criteria]]
text = "tick matches category-prefixed pattern on acceptance criteria"
status = "done"
category = "fixed"

[[content.acceptance_criteria]]
