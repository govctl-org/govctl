[content]
description = """
User guide in docs/guide/ is missing documentation for several CLI features that have been implemented:

1. **Tags system**: govctl tag new/delete/list, --tag filter on list commands, controlled-vocabulary in gov/config.toml. No mention anywhere in the guide.

2. **Guard subcommands**: govctl guard new/list/show/set/delete. Only manual guard file creation is documented.

3. **govctl verify**: Only mentioned in passing as a work-item context. Needs its own section.

4. **govctl self-update**: In README but not in the guide.

5. **govctl init-skills**: --format codex, --dir flags undocumented.

6. **govctl migrate vs /migrate skill**: The distinction is unclear in current docs.

7. **govctl describe**: Machine-readable CLI introspection.

8. **govctl release**: Release cutting workflow.

9. **govctl tui**: Keyboard shortcuts and navigation.

10. **Canonical edit surface**: <resource> edit <ID> <path> --set/--add/--remove/--tick pattern."""

[[content.journal]]
date = "2026-04-21"
scope = "docs"
content = "Updated docs/guide/validation.md with tags system, guard subcommands, verify, self-update, init-skills, and migrate distinction. Updated getting-started.md with TUI shortcuts, release workflow, canonical edit surface, describe command, and migrate comparison table. Updated adrs.md, rfcs.md, and work-items.md with canonical edit paths, path aliases, and tagging examples. Tags field added to work item. govctl check and cargo test pass clean."

