[content]
description = """
Backfill the controlled-vocabulary tags system (per RFC-0002 and ADR-0040) across all governance artifacts in govctl itself. Currently tags.allowed is empty in gov/config.toml and no artifacts have tags. This work item establishes the tag vocabulary and applies tags to RFCs, clauses, ADRs, work items, and guards, so the tags system is dogfooded and validated before users encounter it.

Tags to create:
- core: Core governance framework and meta-governance
- cli: CLI architecture, commands, and routing
- tui: Terminal UI (ratatui)
- validation: Validation, diagnostics, checking
- editing: Edit engine and field manipulation
- lifecycle: Status/phase state machines
- release: Release management and changelog
- skills-agents: Skills and agent framework
- schema: Schema definitions and serialization
- safety: Concurrent access and locking
- documentation: README, docs, guides
- testing: Test infrastructure and coverage
- plugin: Claude Code plugin integration
- migration: Migration tools and brownfield adoption"""

