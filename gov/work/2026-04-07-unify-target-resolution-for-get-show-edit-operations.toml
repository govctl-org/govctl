[content]
description = "Refactor CLI dispatch around a shared target/operation model: unify get with edit target resolution, simplify write-lock classification onto mutating operations, and delete deprecated JSON artifact edit paths while preserving migration support."

[[content.journal]]
date = "2026-04-07"
scope = "router"
content = "Unified command routing around shared operation/target classification; get now resolves through the same field-target planner as edit, main acquires locks from operation mutability, and cargo test -q / cargo run --quiet -- check / cargo clippy --all-targets --all-features -- -D warnings pass. JSON edit-path removal is still pending because current RFC/Clause edit support is storage-agnostic despite legacy JsonAdapter naming."

[[content.journal]]
date = "2026-04-07"
scope = "storage"
content = "Removed deprecated JSON write paths for RFC and Clause mutation flows while preserving legacy JSON reads for validation/display compatibility and v1->v2 migration. Mutating call sites now resolve RFC/Clause writes through TOML-only locators and serializers, and the affected dry-run/delete/display tests were updated to use TOML fixtures."

