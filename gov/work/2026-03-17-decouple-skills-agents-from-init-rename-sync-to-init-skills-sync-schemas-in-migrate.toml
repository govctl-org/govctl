title = "Decouple skills/agents from init, rename sync to init-skills, sync schemas in migrate"
status = "done"
created = "2026-03-17"
started = "2026-03-17"
completed = "2026-03-17"
refs = [
    "ADR-0033",
    "RFC-0002",
]

[content]
description = """
Refactor init/sync/migrate commands to fix three issues:
1. `govctl init` unconditionally dumps skills/agents to `.claude/`, redundant for plugin users per [[ADR-0033]]
2. `govctl sync` name is unclear — it syncs agent assets, not general sync
3. `govctl migrate` does not ensure schema JSON files exist, leaving projects initialized with older versions without working `#:schema` comments

Changes: (a) remove skill/agent dumping from init, add hint; (b) rename `sync` to `init-skills`; (c) add schema file overwrite to migrate pipeline."""

