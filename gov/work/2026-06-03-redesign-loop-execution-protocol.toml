[content]
description = "Redesign govctl loop execution so the existing loop command surface becomes a local execution protocol that reuses work items, depends_on validation, verification guards, notes, and existing schemas instead of acting as an automatic work-item status wrapper."
notes = ["Loop run is intentionally a two-step local protocol: open a round, fill summary evidence after explicit implementation/verification/work commands, then rerun loop run to close and reflect state."]

[[content.acceptance_criteria]]
text = "RFC-0006 defines loop run as a local execution protocol that records and validates round evidence instead of implementing code or directly completing work items"
