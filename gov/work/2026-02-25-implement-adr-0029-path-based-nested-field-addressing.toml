#:schema ../schema/work.schema.json

[govctl]
id = "WI-2026-02-25-003"
title = "Implement ADR-0029 path-based nested field addressing"
status = "done"
created = "2026-02-25"
started = "2026-02-25"
completed = "2026-02-26"
refs = [
    "ADR-0029",
    "ADR-0030",
]

[content]
description = """
Implement ADR-0029 and ADR-0030 by introducing path-based nested field addressing with strict parsing, JSON SSOT plus JSON Schema validation, and macro/codegen-driven dispatch for edit verbs.

Execution plan:
- Phase 1 (Parser correctness): strict grammar parser, full-input consumption, normalization layer for aliases and legacy prefixes, and structured diagnostics for malformed/over-deep paths.
- Phase 2 (Spec and generation): introduce edit-ops.json + edit-ops.schema.json, compile validated spec to generated rule table or macro-backed dispatch, and wire get/set/add/remove binding to spec rules.
- Phase 3 (Hardening and rollout): parity and regression snapshots, docs and help updates, and compatibility behavior verification for legacy field forms."""
notes = [
    "Phase 1 focus: strict parser plus parse/normalize/resolve separation and E0814-E0818 diagnostics stability",
    "Phase 2 focus: JSON SSOT and JSON Schema validation feeding macro/generated dispatch for edit rules",
    "Phase 3 focus: parity snapshots docs help text and migration compatibility verification",
]

