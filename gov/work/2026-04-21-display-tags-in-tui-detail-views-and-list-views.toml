#:schema ../schema/work.schema.json

[govctl]
id = "WI-2026-04-21-003"
title = "Display tags in TUI detail views and list views"
status = "done"
created = "2026-04-21"
started = "2026-04-21"
completed = "2026-04-21"

[content]
description = """
Tags are currently invisible in the TUI. The CLI supports tags (list --tag, tag list, E1105 validation) but the TUI has no tag display and no tag-based filtering.

Changes needed:

1. **RFC detail view**: Show tags as styled pill/badge chips in the header area, after Refs
2. **ADR detail view**: Show tags in the rendered markdown header metadata line
3. **Work item detail view**: Show tags in the rendered markdown header metadata line
4. **Clause detail view**: Show tags in the rendered markdown header metadata line
5. **List views**: Add a tags column to RFC/ADR/Work/Clause list tables
6. **TUI list filtering**: Expose tag-based filtering in the TUI list views (e.g. /tag:core filter syntax or similar)

The render module (render.rs) is the shared pipeline for ADR/Work/Clause detail views in TUI, so adding tags there will automatically surface them in the TUI."""

