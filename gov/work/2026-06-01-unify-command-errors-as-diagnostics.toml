[content]
description = "Systematically tighten production error handling so command and rendering boundaries return Diagnostic/DiagnosticResult instead of wrapping diagnostics in anyhow. Start with the narrowest coherent boundary cleanup found by audit, preserve CLI output semantics, and document remaining non-Diagnostic error surfaces if they require follow-up work."
