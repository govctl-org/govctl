[[changelog]]
version = "1.5.0"
date = "2026-07-15"
notes = "Define guarded correction for local release cuts"
added = ["Define guarded newest-release correction and canonical changelog projection"]
changed = ["Define Releases as local version-cut records"]

[[changelog]]
version = "1.4.2"
date = "2026-07-15"
notes = "Clarify optional Work Item verification lists"
changed = ["Define omitted verification guard and waiver lists as empty"]

[[changelog]]
version = "1.4.1"
date = "2026-07-15"
notes = "Clarify Work Item serialized field requirements"
changed = ["Allow empty Work Item list fields to be omitted while requiring created metadata and completion criteria"]

[[changelog]]
version = "1.4.0"
date = "2026-07-15"
notes = "Clarify lifecycle and ADR projection boundaries"
added = ["Define ADR projection ownership validation"]
changed = [
    "Scope RFC phase to each version",
    "Freeze Work Items at unique release membership",
]

[[changelog]]
version = "1.3.3"
date = "2026-06-11"
notes = "Clarify inline reference validation"
changed = ["Project validation should warn on known artifact IDs in governed prose that are not written with inline reference syntax"]

[[changelog]]
version = "1.3.2"
date = "2026-06-04"
notes = "Align reference hierarchy wording"
changed = ["reference hierarchy wording now describes only the RFC-to-ADR-or-Work Item and ADR-to-Work Item prohibitions"]

[[changelog]]
version = "1.3.1"
date = "2026-06-04"
notes = "Close plain-text reference hierarchy loophole"
changed = ["Known lower-authority artifact IDs in governed RFC/ADR prose are validated even without [[...]] delimiters"]

[[changelog]]
version = "1.3.0"
date = "2026-06-04"
notes = "Remove legacy JSON artifact storage compatibility"
removed = ["legacy RFC and clause JSON storage is no longer supported in normal operation"]

[[changelog]]
version = "1.2.0"
date = "2026-05-31"
notes = "Remove a legacy execution-history field from Work Item field operations"
changed = ["historical execution entries may still be parsed for Work Item rendering"]
removed = ["legacy execution-history field is no longer path-addressable per ADR-0047"]

[[changelog]]
version = "1.1.1"
date = "2026-03-22"
notes = "Clarify machine-validated reference hierarchy for refs and [[...]]"
