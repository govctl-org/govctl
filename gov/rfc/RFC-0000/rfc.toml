[[changelog]]
version = "1.1.0"
date = "2026-03-17"
notes = "Add verification guards and work-item verification metadata"
added = ["Added Verification Guard artifact definition and work-item verification fields"]

[[changelog]]
version = "1.0.2"
date = "2026-03-17"
notes = "Record release artifact clause and migration amendments"

[[changelog]]
version = "1.0.1"
date = "2026-01-26"
notes = "Add artifact reference hierarchy clause"
added = ["Add C-REFERENCE-HIERARCHY clause defining that RFCs must not reference ADRs"]

[[changelog]]
version = "1.0.0"
date = "2026-01-17"
notes = "Initial stable release of the govctl governance framework."
added = [
    "RFC specification with status and phase lifecycle",
    "Clause specification for normative and informative requirements",
    "ADR specification for architectural decisions",
    "Work Item specification for task tracking",
]
