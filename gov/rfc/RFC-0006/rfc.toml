    "loop run --max-rounds retry-budget argument",
    "max_rounds from new loop round artifacts",
]

[[changelog]]
version = "0.4.0"
date = "2026-06-03"
notes = "Define loop command surface"
added = ["Loop command surface defines canonical loop subcommands and argument roles"]
changed = ["Loop run advances an existing local round protocol by LOOP-ID with explicit --work target selection"]

[[changelog]]
version = "0.3.0"
date = "2026-06-01"
notes = "Define loop listing discovery"
added = ["Loop listing command discovers persisted local loop state"]

[[changelog]]
version = "0.2.0"
date = "2026-06-01"
notes = "Define loop scope mutation and canonical loop IDs"
added = ["Loop scope mutation supports replan plus add/remove of the editable work field"]
changed = ["Loop IDs use LOOP-YYYY-MM-DD-NNN canonical format"]

