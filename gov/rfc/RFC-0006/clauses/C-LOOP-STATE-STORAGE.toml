#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-LOOP-STATE-STORAGE"
title = "Loop State Storage"
kind = "normative"
status = "active"
since = "0.1.0"
tags = ["core"]

[content]
text = '''
Loop execution state MUST be stored under `.govctl/loops/<loop-id>/`.

A loop ID MUST be a non-empty path segment matching `^[A-Za-z0-9][A-Za-z0-9._-]*$`. A loop ID MUST NOT contain `/`, `\`, or `..` path traversal segments.

Each loop directory MUST contain `state.toml` as its authoritative state file. The `state.toml` file MUST use the following top-level shape:

```toml
[loop]
id = "<loop-id>"
state = "pending|active|paused|completed|failed"
root_work_items = ["WI-YYYY-MM-DD-NNN"]
work_items = ["WI-YYYY-MM-DD-NNN"]

[dependencies]
"WI-YYYY-MM-DD-NNN" = ["WI-YYYY-MM-DD-NNN"]

[items."WI-YYYY-MM-DD-NNN"]
status = "pending|active|done|failed|blocked|cancelled"
round_count = 0
```

The `loop.id` value MUST match the `<loop-id>` directory name. The `loop.state` value MUST be one of the loop lifecycle states defined by [[RFC-0006:C-LOOP-LIFECYCLE]]. The `loop.root_work_items` array MUST preserve the explicit work item set requested at loop start. The `loop.work_items` array MUST contain the resolved dependency closure and MUST include every `loop.root_work_items` entry. The `loop.root_work_items` and `loop.work_items` arrays MUST NOT contain duplicate Work Item IDs.

The `[dependencies]` table MUST contain one entry for each work item in `loop.work_items`. Each dependency entry MUST be an array of Work Item IDs. Each dependency ID MUST also appear in `loop.work_items`. Dependency arrays MUST NOT contain duplicate Work Item IDs.

The `[items.<WI-ID>]` table MUST contain one entry for each work item in `loop.work_items`. Each item `status` MUST be one of the loop-level work item statuses defined by [[RFC-0006:C-WORK-ITEM-INTERACTION]]. Each `round_count` MUST be a non-negative integer.

Loop state storage MUST be keyed by loop ID, not by work item ID. A multi-work-item loop MUST have one shared loop state root so dependency planning, failure propagation, and resumption use the same authoritative state.

Implementations MAY store detailed per-round artifacts under `.govctl/loops/<loop-id>/rounds/<WI-ID>/`. Detailed execution trace MAY be omitted, but when persisted it MUST live under the loop directory and MUST NOT be written to work item fields.

Loop state is local execution state, not a governed artifact. Deleting `.govctl/loops/` MUST NOT invalidate RFCs, ADRs, Work Items, Guards, or rendered governance projections, but MAY remove resumability and local execution trace.

Rationale: A loop can drive multiple work items, so a per-work-item state root cannot represent the loop lifecycle, dependency graph, or aggregate outcome. A single loop directory keeps execution state separate from work item files while preserving enough state for resumption.'''
