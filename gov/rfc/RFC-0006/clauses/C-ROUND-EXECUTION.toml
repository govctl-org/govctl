#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-ROUND-EXECUTION"
title = "Round Execution"
kind = "normative"
status = "active"
since = "0.1.0"
tags = [
    "core",
    "validation",
]

[content]
text = """
Each work item is processed through iterative **rounds** until termination.

**Round structure:**

Each round MUST:
1. Read the work item (description, acceptance criteria, refs, notes)
2. Implement changes addressing pending acceptance criteria
3. Run verification guards
4. Evaluate acceptance criteria (ticked, still pending, or failed)
5. Record loop execution state (what was done, what changed, why) outside the work item file
6. Decide: continue (pending criteria remain) or terminate (all done or failed)

**Termination conditions:**

A work item MUST terminate when:
- **Success**: All acceptance criteria are satisfied and all required guards pass
- **Failure**: Any of the following conditions are met:
  - Maximum rounds reached. Implementations MUST define and display the max-round limit before or when execution starts.
  - Critical guard execution error, such as a guard command that cannot be launched or a guard timeout. A normal guard assertion failure is a failed verification result, not a critical guard execution error.
  - Execution cannot proceed because required information, permissions, or a non-conflicting specification path is unavailable.

**Post-termination:**

- On success: The work item MUST transition to `done` via `govctl work move`
- On failure: The work item remains in `active` state but is marked as `failed` in loop state
- Failed work items trigger failure propagation per C-DEPENDENCY-SEMANTICS

Rationale: Rounds provide iterative refinement toward acceptance criteria. The round structure ensures each iteration makes measurable progress without writing execution trace into the work item field surface. Termination conditions prevent infinite loops while allowing implementations to define appropriate limits."""
