#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-LOOP-DEFINITION"
title = "Loop Definition"
kind = "normative"
status = "active"
since = "0.1.0"
tags = ["core"]

[content]
text = """
A **loop** is an execution session that drives one or more work items to completion through iterative rounds of implementation, verification, and refinement.

Each loop MUST:
1. Be initialized from an explicit, finite root set of work items
2. Resolve the transitive dependency closure before execution begins
3. Recompute the transitive dependency closure after any successful scope mutation defined by [[RFC-0006:C-LOOP-SCOPE-MUTATION]]
4. Track execution state independently of work item files
5. Terminate when all work items in the current resolved loop set reach terminal loop-level outcomes or a failure condition is met

A loop MAY support explicit scope mutation after start. A scope mutation MUST be requested through loop commands; implementations MUST NOT treat unrelated work item file edits as implicit loop scope changes.

A loop MUST NOT:
1. Modify work item files directly (MUST use `govctl work` commands for status transitions)
2. Persist execution trace to work item fields; execution trace belongs in loop state
3. Assume a specific execution order (sequential or parallel) — downstream implementations choose

Rationale: Loops are a first-class execution concept that orchestrate work item completion. By keeping loops separate from work item files, we maintain clear separation between execution state (ephemeral) and governance artifacts (durable). Work item `notes` hold durable constraints and learnings that should survive future work; loop state holds execution trace. Using `govctl work` commands ensures all status transitions are validated and auditable. Explicit scope mutation lets long cleanup loops adapt without replacing the execution session identity."""
