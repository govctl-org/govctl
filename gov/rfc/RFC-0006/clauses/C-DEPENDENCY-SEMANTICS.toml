#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-DEPENDENCY-SEMANTICS"
title = "Work Item Dependency Semantics"
kind = "normative"
status = "active"
since = "0.1.0"
tags = ["lifecycle", "validation", "work-items"]

[content]
text = """
Work items MAY declare dependencies on other work items using the `depends_on` field in the `[govctl]` section. The `depends_on` field MUST contain a list of work item IDs.

**Dependency rules:**

1. **Acyclicity**: The dependency graph MUST be acyclic. Implementations MUST detect cycles at loop start and reject the loop with a clear error message identifying the cycle.

2. **Blocking semantics**: A work item MUST NOT begin execution until all its dependencies reach terminal state (done or cancelled).

3. **Outcome checking**: After all dependencies reach terminal state, the loop MUST check their outcomes:
   - If all dependencies are `done`: the dependent work item MAY proceed with execution
   - If any dependency is `cancelled` or `failed`: the dependent work item MUST be marked as `blocked` and MUST NOT be executed

4. **Distinction from refs**: The `depends_on` field is distinct from `refs`:
   - `refs`: informational cross-references to related artifacts (RFCs, ADRs, work items)
   - `depends_on`: blocking execution dependencies (work items only)

5. **Failure propagation**: When a work item is marked as `blocked`, all work items that depend on it (directly or transitively) MUST also be marked as `blocked`.

**Loop-level status tracking**: The `blocked` and `failed` states are loop-level execution statuses tracked in loop state, not work item `status` field values. Work items maintain their own lifecycle states (queue, active, done, cancelled) per RFC-0001:C-WORK-STATUS.

Rationale: Dependencies enable complex workflows where work items must be executed in a specific order. By keeping `depends_on` separate from `refs`, we maintain clear semantics: `refs` are informational, `depends_on` are blocking. Loop-level status tracking avoids polluting the work item status field with execution-specific states.
"""
