#:schema ../../../schema/clause.schema.json

[govctl]
id = "C-LOOP-LIFECYCLE"
title = "Loop Lifecycle"
kind = "normative"
status = "active"
since = "0.1.0"
tags = ["lifecycle", "core"]

[content]
text = """
A loop MUST have exactly one of the following lifecycle states:

1. **pending** — Initial state. The loop is defined but execution has not started.
2. **active** — The loop is currently executing rounds on work items.
3. **completed** — All work items reached terminal state (done or cancelled).
4. **failed** — A failure condition was met (max rounds exceeded, critical error).

Valid transitions:
- pending → active (loop execution begins)
- active → completed (all work items finished successfully)
- active → failed (failure condition met)
- active → pending (loop paused for resumption)

Invalid transitions (MUST be rejected):
- completed → any (terminal state)
- failed → any (terminal state)
- pending → completed (cannot complete without being active)
- pending → failed (cannot fail without being active)

Rationale: The loop lifecycle provides clear semantics for tracking execution progress and enables resumption after interruption. Terminal states (completed, failed) indicate the loop has finished and cannot be restarted.
"""
