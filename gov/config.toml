[paths]
docs_output = "docs"

[project]
default_owner = "@govctl-org"
name = "govctl"

[schema]
version = 2

[source_scan]
enabled = true
exclude = []
include = ["src/**/*.rs"]

[tags]
allowed = [
    "tui",
    "lifecycle",
    "core",
    "editing",
    "cli",
    "validation",
    "release",
    "skills-agents",
    "schema",
    "safety",
    "documentation",
    "testing",
    "plugin",
    "migration",
]

[verification]
default_guards = [
    "GUARD-GOVCTL-CHECK",
    "GUARD-CARGO-TEST",
]
enabled = true
