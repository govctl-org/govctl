name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      commit: ${{ steps.meta.outputs.commit }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract tag metadata
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          COMMIT="$(git rev-parse "${GITHUB_REF_NAME}^{commit}")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Verify tag is reachable from origin/main
        shell: bash
        run: |
          git fetch origin main
          COMMIT="${{ steps.meta.outputs.commit }}"
          if ! git merge-base --is-ancestor "${COMMIT}" "origin/main"; then
            echo "Tagged commit ${COMMIT} is not reachable from origin/main" >&2
            exit 1
          fi

      - name: Verify release metadata versions match tag
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          CARGO_VERSION="$(grep -E '^version = "' Cargo.toml | head -n1 | cut -d'"' -f2)"
          if [ "${CARGO_VERSION}" != "${VERSION}" ]; then
            echo "Cargo.toml version ${CARGO_VERSION} does not match tag v${VERSION}" >&2
            exit 1
          fi

          if ! grep -Fq "## [${VERSION}] -" CHANGELOG.md; then
            echo "CHANGELOG.md is missing section for ${VERSION}" >&2
            exit 1
          fi

          if ! grep -Fq "version = \"${VERSION}\"" gov/releases.toml; then
            echo "gov/releases.toml is missing release entry for ${VERSION}" >&2
            exit 1
          fi

      - name: Generate release notes from CHANGELOG
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          PREVIOUS_TAG="$(git tag --sort=-version:refname | sed -n '2p')"
          {
            printf '## %s\n\n' "govctl v${VERSION}"
            awk -v version="${VERSION}" '
              $0 ~ "^## \\[" version "\\] - " { capture=1; next }
              capture && $0 ~ "^## \\[" { exit }
              capture { print }
            ' CHANGELOG.md
            if [ -n "${PREVIOUS_TAG}" ]; then
              printf '\n**Full Changelog**: https://github.com/%s/compare/%s...v%s\n' \
                "${GITHUB_REPOSITORY}" \
                "${PREVIOUS_TAG}" \
                "${VERSION}"
            fi
          } > release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 1

  # Build binaries for all platforms
  build:
    name: Build ${{ matrix.target }}${{ matrix.suffix }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          BINARY="govctl"
          ARCHIVE_NAME="govctl-${VERSION}-${{ matrix.target }}"

          mkdir -p "dist/${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/${BINARY}" "dist/${ARCHIVE_NAME}/"
          cp README.md LICENSE* "dist/${ARCHIVE_NAME}/" 2>/dev/null || true

          cd dist
          tar -czvf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF -replace 'refs/tags/', ''
          $ARCHIVE_NAME = "govctl-${VERSION}-${{ matrix.target }}"

          New-Item -ItemType Directory -Force -Path "dist\${ARCHIVE_NAME}"
          Copy-Item "target\${{ matrix.target }}\release\govctl.exe" "dist\${ARCHIVE_NAME}\"
          Copy-Item README.md, LICENSE* -Destination "dist\${ARCHIVE_NAME}\" -ErrorAction SilentlyContinue

          Compress-Archive -Path "dist\${ARCHIVE_NAME}" -DestinationPath "dist\${ARCHIVE_NAME}.zip"
          echo "ASSET=${ARCHIVE_NAME}.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: dist/${{ env.ASSET }}
          retention-days: 1

  # Create GitHub release with all artifacts
  release:
    name: Create Release
    needs: [verify, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Extract version
        run: echo "VERSION=v${{ needs.verify.outputs.version }}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          generate_release_notes: false
          body_path: artifacts/release-notes.md
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
